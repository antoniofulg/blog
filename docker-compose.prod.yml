# Production stack — managed by deploy.sh via GitHub Actions CD; do not run manually.
# Requires env: GHCR_OWNER, GHCR_REPO, IMAGE_TAG (defaults to latest)

networks:
  blog:
    name: blog

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks: [blog]

  app:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks: [blog]

volumes:
  postgres_data:
