# Developer workflow — use the Makefile targets, not these compose commands directly:
#   make setup        First-clone: copy .env, start DB, run migrations
#   make dev          Native Bun dev server (default)
#   make dev-docker   Fully containerized dev stack
# Run `make help` for the full list of targets.

networks:
  blog:
    name: blog

services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks: [blog]

  app:
    build:
      context: .
      target: dev
    command: bun dev --port 3000
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /app/node_modules
    networks: [blog]
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
        - action: sync
          path: ./content
          target: /app/content
        - action: sync
          path: ./drizzle
          target: /app/drizzle
        - action: rebuild
          path: package.json
        - action: rebuild
          path: bun.lock

volumes:
  postgres_data:
