# Start the database, then run the app locally:
#   docker compose up -d && bun dev

networks:
  blog:
    name: blog

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks: [blog]

  app:
    build:
      context: .
      target: dev
    command: bun dev --port 3000
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /app/node_modules
    networks: [blog]
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
        - action: sync
          path: ./content
          target: /app/content
        - action: sync
          path: ./drizzle
          target: /app/drizzle
        - action: rebuild
          path: package.json
        - action: rebuild
          path: bun.lock

volumes:
  postgres_data:
