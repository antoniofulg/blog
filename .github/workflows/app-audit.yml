name: App Audit

on:
  workflow_dispatch:
    inputs:
      lighthouse:
        description: Run Lighthouse analysis
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
  pull_request:
    paths:
      - 'app/routes/**'
      - 'app/components/**'
      - 'app/lib/**'
      - 'app/db/schema.ts'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: blog
          POSTGRES_USER: blog
          POSTGRES_PASSWORD: blog
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - run: cp .env.example .env

      - name: Apply database migrations
        env:
          DATABASE_URL: postgres://blog:blog@localhost:5432/blog
        run: bun run db:migrate

      - name: Build app
        env:
          DATABASE_URL: postgres://blog:blog@localhost:5432/blog
        run: bun run build

      - name: Run app audit
        id: audit
        env:
          DATABASE_URL: postgres://blog:blog@localhost:5432/blog
          AUDIT_BASE_URL: http://localhost:4173
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          TRIGGER="${PR_NUM:+ci-pr-$PR_NUM}"
          TRIGGER="${TRIGGER:-manual}"

          if [ "${{ github.event.inputs.lighthouse }}" = "true" ]; then
            LIGHTHOUSE_FLAG="--lighthouse"
          else
            LIGHTHOUSE_FLAG="--no-lighthouse"
          fi

          # run-audit-fe.ts orchestrates the Nitro preview server lifecycle —
          # spawn on PORT=4173, poll until ready, run audit, reap on exit.
          # Replaces the prior background `bun run preview &` + manual curl
          # poll which used the wrong command (vite preview cannot serve the
          # Nitro SSR bundle) and lacked reliable teardown.
          set +e
          output=$(bun run scripts/run-audit-fe.ts "--trigger=${TRIGGER}" "$LIGHTHOUSE_FLAG" 2>&1)
          set -e
          echo "$output"

          counts_line=$(echo "$output" | grep '^\[audit-counts\]' || echo "[audit-counts] blockers=0 majors=0 minors=0")
          blockers=$(echo "$counts_line" | grep -oP 'blockers=\K\d+' || echo "0")
          majors=$(echo "$counts_line" | grep -oP 'majors=\K\d+' || echo "0")
          minors=$(echo "$counts_line" | grep -oP 'minors=\K\d+' || echo "0")

          echo "blockers=${blockers:-0}" >> "$GITHUB_OUTPUT"
          echo "majors=${majors:-0}" >> "$GITHUB_OUTPUT"
          echo "minors=${minors:-0}" >> "$GITHUB_OUTPUT"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-audit-report-${{ github.run_id }}
          path: docs/_reports/app-audit-*.md

      - name: Check delta
        if: github.event_name == 'pull_request'
        id: delta
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const prevComment = comments
              .filter(c => c.user.login === 'github-actions[bot]')
              .find(c => c.body && c.body.includes('<!-- audit-fingerprint:app:'));

            const currentBlockers = parseInt('${{ steps.audit.outputs.blockers }}') || 0;
            const currentMajors = parseInt('${{ steps.audit.outputs.majors }}') || 0;

            let suppress = false;
            if (prevComment) {
              const match = prevComment.body.match(/<!-- audit-fingerprint:app:blocker=(\d+) major=(\d+) -->/);
              if (match) {
                const prevBlockers = parseInt(match[1]);
                const prevMajors = parseInt(match[2]);
                suppress = currentBlockers === 0 && currentMajors === prevMajors;
              }
            }

            core.setOutput('suppress', suppress.toString());

      - name: Post or update PR comment
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          steps.delta.outputs.suppress != 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- audit-fingerprint:app:"
          body: |
            ## App Audit Results

            | Severity | Count |
            |----------|-------|
            | Blocker | ${{ steps.audit.outputs.blockers }} |
            | Major | ${{ steps.audit.outputs.majors }} |
            | Minor | ${{ steps.audit.outputs.minors }} |

            [View full report artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            <!-- audit-fingerprint:app:blocker=${{ steps.audit.outputs.blockers }} major=${{ steps.audit.outputs.majors }} -->
