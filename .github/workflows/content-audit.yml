name: Content Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app/content/posts/**'
      - 'app/db/schema.ts'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - run: cp .env.example .env

      - name: Run content audit
        id: audit
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          TRIGGER="${PR_NUM:+ci-pr-$PR_NUM}"
          TRIGGER="${TRIGGER:-manual}"

          set +e
          output=$(bun run audit:content "--trigger=${TRIGGER}" 2>&1)
          set -e
          echo "$output"

          blockers=$(echo "$output" | grep -oP '\d+(?= blocker)' | head -1 || echo "0")
          majors=$(echo "$output" | grep -oP '\d+(?= major)' | head -1 || echo "0")
          minors=$(echo "$output" | grep -oP '\d+(?= minor)' | head -1 || echo "0")

          echo "blockers=${blockers:-0}" >> "$GITHUB_OUTPUT"
          echo "majors=${majors:-0}" >> "$GITHUB_OUTPUT"
          echo "minors=${minors:-0}" >> "$GITHUB_OUTPUT"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-audit-report-${{ github.run_id }}
          path: docs/_reports/content-audit-*.md

      - name: Check delta
        if: github.event_name == 'pull_request'
        id: delta
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const prevComment = comments
              .filter(c => c.user.login === 'github-actions[bot]')
              .find(c => c.body && c.body.includes('<!-- audit-fingerprint'));

            const currentBlockers = parseInt('${{ steps.audit.outputs.blockers }}') || 0;
            const currentMajors = parseInt('${{ steps.audit.outputs.majors }}') || 0;

            let suppress = false;
            if (prevComment) {
              const match = prevComment.body.match(/<!-- audit-fingerprint:blocker=(\d+) major=(\d+) -->/);
              if (match) {
                const prevBlockers = parseInt(match[1]);
                const prevMajors = parseInt(match[2]);
                suppress = currentBlockers === 0 && currentMajors === prevMajors;
              }
            }

            core.setOutput('suppress', suppress.toString());

      - name: Post or update PR comment
        if: github.event_name == 'pull_request' && steps.delta.outputs.suppress != 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- audit-fingerprint"
          body: |
            ## Content Audit Results

            | Severity | Count |
            |----------|-------|
            | Blocker | ${{ steps.audit.outputs.blockers }} |
            | Major | ${{ steps.audit.outputs.majors }} |
            | Minor | ${{ steps.audit.outputs.minors }} |

            [View full report artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            <!-- audit-fingerprint:blocker=${{ steps.audit.outputs.blockers }} major=${{ steps.audit.outputs.majors }} -->
