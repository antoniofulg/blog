name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [test, lint, check, build-js]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: cp .env.example .env
      - run: make ${{ matrix.check }}

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build runner image
        run: docker build --target runner -t blog-runner-test .
      - name: Start DB
        run: |
          docker network create blog || true
          docker run -d --name db --network blog \
            -e POSTGRES_DB=blog -e POSTGRES_USER=blog -e POSTGRES_PASSWORD=blog \
            postgres:16-alpine
          sleep 5
      - name: Test db:migrate inside container
        run: |
          docker run --rm \
            --network blog \
            -e DATABASE_URL=postgres://blog:blog@db:5432/blog \
            blog-runner-test \
            bun run db:migrate

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  branch-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          echo "$BRANCH_NAME" | \
          grep -qE '^(TASK-[0-9]+/[a-z0-9][a-z0-9-]*|hotfix/.+)$' || \
          { echo "Branch must match TASK-XXXX/slug or hotfix/*"; exit 1; }
