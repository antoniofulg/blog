name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [test, lint, check, build-js, e2e, lint-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: cp .env.example .env
      - name: Cache Playwright Chromium
        if: matrix.check == 'e2e'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install Playwright Chromium
        if: matrix.check == 'e2e'
        run: bunx playwright install --with-deps chromium
      - name: Build app for e2e
        if: matrix.check == 'e2e'
        run: bun run build
      - run: make ${{ matrix.check }}
        env:
          # E2E credentials are needed by both:
          #   - `test` matrix entry → vitest exercises e2e-harness.test.ts which
          #     invokes tests/e2e/global-setup.ts → seedAdminUser() → requires
          #     E2E_ADMIN_EMAIL on CI (throws if missing).
          #   - `e2e` matrix entry → Playwright login fixture uses the same vars.
          # Inject unconditionally for all matrix entries so the credential is
          # always available; non-consumers ignore the unused env.
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      - name: Upload Playwright report
        if: always() && matrix.check == 'e2e'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build runner image
        run: docker build --target runner -t blog-runner-test .
      - name: Start DB
        run: |
          docker network create blog || true
          docker run -d --name db --network blog \
            -e POSTGRES_DB=blog -e POSTGRES_USER=blog -e POSTGRES_PASSWORD=blog \
            postgres:16-alpine
          sleep 5
      - name: Test db:migrate inside container
        run: |
          docker run --rm \
            --network blog \
            -e DATABASE_URL=postgres://blog:blog@db:5432/blog \
            blog-runner-test \
            bun run db:migrate

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  branch-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          echo "$BRANCH_NAME" | \
          grep -qE '^(TASK-[0-9]+/[a-z0-9][a-z0-9-]*|hotfix/.+)$' || \
          { echo "Branch must match TASK-XXXX/slug or hotfix/*"; exit 1; }
